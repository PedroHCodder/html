<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas em HTML 5</title>
</head>
<body>
    <h1>Tabelas em HTML 5</h1>
    <table border="10">
        <thead>
            <tr>
                <th>Nome do Aluno</th>
                <th>Disciplina</th>
                <th>Nota Final</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Pedro Henrick</td>
                <td>Inglês</td>
                <td>10.0</td>
            </tr>
            <tr>
                <td>Enzo Geovane</td>
                <td>Inglês</td>
                <td>4.5</td>
            </tr>
            <tr>
                <td>Paulo Vitor</td>
                <td>Inglês</td>
                <td>7.5</td>
            </tr>
        </tbody>

        <tfoot>
            <tr>
                <td colspan="2"><strong>Média da Turma</strong></td>
                <td> <strong>7.5</strong></td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
